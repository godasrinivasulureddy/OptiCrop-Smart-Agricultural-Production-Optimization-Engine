version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: opticrop_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-opticrop}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opticrop_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-opticrop}
      - SECRET_KEY=${SECRET_KEY:-SUPER_SECRET_FALLBACK_KEY_CHANGEME}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost}
    ports:
      - "8000:8000"
    depends_on:
      - db
    # We override the command to run migrations before starting
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opticrop_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
